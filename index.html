<script>
    document.addEventListener("DOMContentLoaded", function() {
        const diasPrueba = 15;
        const fechaInicio = localStorage.getItem('fecha_registro_dra');
        const ahora = new Date().getTime();

        if (!fechaInicio) {
            // Si es la primera vez que entra, guardamos la fecha actual
            localStorage.setItem('fecha_registro_dra', ahora);
        } else {
            // Calculamos la diferencia en días
            const diferenciaMs = ahora - parseInt(fechaInicio);
            const diasTranscurridos = diferenciaMs / (1000 * 60 * 60 * 24);

            if (diasTranscurridos > diasPrueba) {
                // Bloqueo de la página
                document.body.innerHTML = `
                    <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif; background: #f8fafc; text-align: center; padding: 20px;">
                        <h1 style="color: #1e40af; font-size: 2rem; margin-bottom: 1rem;">Período de mantenimiento requerido</h1>
                        <p style="color: #64748b; font-size: 1.1rem;">El acceso a este portal ha expirado. Por favor, contacte al administrador para renovar el servicio.</p>
                        <div style="margin-top: 2rem; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; color: #94a3b8;">
                            ID de Cliente: DRA-RMR-001
                        </div>
                    </div>
                `;
                document.body.style.overflow = "hidden";
            }
        }
    });
</script>
